<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Figma Token Replacer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background-color: #f5f5f5;
    }
    * {
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #1E90FF;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 24px;
    }
    .upload-container {
      border: 2px dashed #d0d0d0;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background-color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-container:hover {
      border-color: #1E90FF;
      background-color: #fafbff;
    }
    .file-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .button-primary {
      width: 100%;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 600;
      background-color: #0F1C2E;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .button-primary:hover {
      background-color: #1a2d47;
    }
    .button-secondary {
      width: 100%;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 600;
      background-color: white;
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #e0e0e0;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .button-secondary:hover {
      background-color: #f8f8f8;
    }
    .token-card {
      background-color: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #e8e8e8;
    }
    .token-name {
      font-size: 12px;
      font-weight: 500;
      color: #0F1C2E;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .token-details {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .token-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: #f5f5f5;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    }
    .token-label {
      color: #666;
      font-size: 10px;
      font-weight: 600;
    }
    .section-header {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-line {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #333;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background-color: #4CAF50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: white;
      font-size: 48px;
      font-weight: 300;
    }
    .error-badge {
      display: inline-block;
      background-color: #f44336;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    .coming-soon {
      color: #999;
      font-size: 11px;
      margin-left: 8px;
    }
    .status-card {
      background-color: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #e8e8e8;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 12px;
    }
    .status-label {
      color: #666;
      font-weight: 500;
    }
    .status-value {
      color: #0F1C2E;
      font-weight: 600;
    }
    .action-button {
      width: 100%;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      background-color: white;
      color: #0F1C2E;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #e8e8e8;
      transition: all 0.2s;
      margin-bottom: 8px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-button:hover {
      background-color: #f8f8f8;
      border-color: #1E90FF;
    }
    .action-button-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .action-button-disabled:hover {
      background-color: white;
      border-color: #e0e0e0;
    }
    .action-icon {
      font-size: 18px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinning {
      animation: spin 0.7s linear infinite;
    }
    .settings-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      background-color: white;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 16px;
    }
    .settings-icon:hover {
      background-color: #f8f8f8;
      border-color: #1E90FF;
    }
    .collection-header {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #f8f9fa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 12px;
      color: #0F1C2E;
      cursor: default;
      transition: all 0.2s;
    }
    .collection-header.drag-over {
      border-color: #1E90FF;
      background: #eef6ff;
    }
    .variable-row {
      display: flex;
      align-items: center;
      padding: 8px 12px 8px 24px;
      border: 1px solid transparent;
      border-radius: 6px;
      margin-bottom: 2px;
      font-size: 12px;
      cursor: grab;
      background: white;
      transition: all 0.15s;
      gap: 8px;
    }
    .variable-row:hover {
      background: #f8f9fa;
      border-color: #e8e8e8;
    }
    .variable-row.dragging {
      opacity: 0.4;
    }
    .drag-handle {
      color: #ccc;
      font-size: 14px;
      cursor: grab;
      flex-shrink: 0;
    }
    .var-type-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .var-type-COLOR { background: #fce7f3; color: #be185d; }
    .var-type-FLOAT { background: #dbeafe; color: #1d4ed8; }
    .var-type-BOOLEAN { background: #dcfce7; color: #15803d; }
    .var-type-STRING { background: #f3f4f6; color: #374151; }
    .color-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .screen-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .back-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: #0F1C2E;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s;
    }
    .back-icon:hover {
      background: #f8f8f8;
      border-color: #1E90FF;
    }
    .screen-title {
      margin: 0 0 2px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0F1C2E;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .screen-subtitle {
      margin: 0;
      font-size: 12px;
      color: #999;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      font-size: 13px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .input-field:focus {
      outline: none;
      border-color: #1E90FF;
    }
    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: #0F1C2E;
      margin-bottom: 6px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
      <div class="screen-header">
        <div class="back-icon" onclick="showDashboard()">←</div>
        <div>
          <p class="screen-title">Import JSON</p>
          <p class="screen-subtitle">Upload a token file to import</p>
        </div>
      </div>

      <div class="upload-container" id="dropzone" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0;">
        <div class="file-icon">📄</div>
        <div style="font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #0F1C2E;">Drop your JSON file here</div>
        <div style="font-size: 12px; color: #999;">or click to browse</div>
        <input type="file" accept=".json" id="file-input" style="display: none;" />
      </div>

      <div style="background-color: #f5f5f5; padding: 16px 0 12px 0;">
        <button class="button-primary" onclick="document.getElementById('file-input').click()">Choose File</button>
        <button class="button-secondary" disabled style="opacity: 0.5; cursor: not-allowed;">Fetch from GitHub</button>
      </div>
    </div>
  </div>

  <script>
    console.log('Script starting...');

    let jsonTokens = null;
    let figmaVariables = [];
    let fileName = '';
    let currentVariableCount = 0;
    let githubConfig = null;

    const uploadScreenHTML = document.getElementById('root').innerHTML;

    const fileInput = document.getElementById('file-input');
    const dropzone = document.getElementById('dropzone');

    console.log('Elements found:', { fileInput, dropzone });

    function showDashboard() {
      parent.postMessage({ pluginMessage: { type: 'get-dashboard-data' } }, '*');
    }

    var _isRefreshing = false;

    function refreshDashboard() {
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.classList.add('spinning');
      _isRefreshing = true;
      parent.postMessage({ pluginMessage: { type: 'get-dashboard-data' } }, '*');
    }

    function showRefreshSuccess() {
      const btn = document.getElementById('refresh-btn');
      if (!btn) return;
      btn.classList.remove('spinning');
      btn.textContent = '✓';
      btn.style.color = '#22c55e';
      btn.style.fontWeight = '700';
      setTimeout(function() {
        btn.textContent = '↻';
        btn.style.color = '';
        btn.style.fontWeight = '';
      }, 1500);
    }

    function renderDashboard(data) {
      currentVariableCount = data.variableCount || 0;

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 12px 20px; position: relative;">
          <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 8px;">
            <div class="settings-icon" id="refresh-btn" onclick="refreshDashboard()" title="Refresh" style="position: static;">↻</div>
            <div class="settings-icon" onclick="showGitHubSettings()" title="GitHub Settings" style="position: static;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
              </svg>
            </div>
          </div>

          <div class="logo">b/</div>

          <h2 style="margin: 0 0 16px 0; font-size: 16px; font-weight: 600; color: #0F1C2E;">Token Manager</h2>

          <div class="status-card">
            <div style="font-size: 12px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Current Status</div>
            <div class="status-row">
              <span class="status-label">Variables in Figma</span>
              <span class="status-value">${currentVariableCount}</span>
            </div>
            ${data.githubConnected ? `
              <div class="status-row" style="border-top: 1px solid #f0f0f0; margin-top: 8px; padding-top: 12px;">
                <span class="status-label">Connected Repo</span>
                <span class="status-value" style="font-size: 11px;">${data.githubRepo}</span>
              </div>
            ` : ''}
          </div>

          <div style="font-size: 12px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Quick Actions</div>

          <button class="action-button" onclick="showUploadScreen()">
            <span class="action-icon">📥</span>
            <span>Import JSON File</span>
          </button>

          ${currentVariableCount > 0 ? `
            <button class="action-button" onclick="exportTokens()">
              <span class="action-icon">📤</span>
              <span>Export Tokens as JSON</span>
            </button>
          ` : ''}

          <button class="action-button ${!data.githubConnected ? 'action-button-disabled' : ''}" ${!data.githubConnected ? 'disabled' : 'onclick="showPushScreen()"'}>
            <span class="action-icon">🚀</span>
            <span>Push to GitHub</span>
            ${!data.githubConnected ? '<span style="font-size: 10px; color: #bbb; margin-left: auto;">Configure GitHub first</span>' : ''}
          </button>

          <button class="action-button" onclick="showCollectionManager()">
            <span class="action-icon">🗂️</span>
            <span>Collection Manager</span>
            <span style="margin-left: auto; background: #f59e0b; color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;">BETA</span>
          </button>
        </div>
      `;
    }

    function showUploadScreen() {
      jsonTokens = null;
      figmaVariables = [];
      fileName = '';

      const hasGitHubConfig = githubConfig && githubConfig.token && githubConfig.owner && githubConfig.repo && githubConfig.path;

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
          <div class="screen-header">
            <div class="back-icon" onclick="showDashboard()">←</div>
            <div>
              <p class="screen-title">Import JSON</p>
              <p class="screen-subtitle">Upload a token file to import</p>
            </div>
          </div>

          <div class="upload-container" id="dropzone" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0;">
            <div class="file-icon">📄</div>
            <div style="font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #0F1C2E;">Drop your JSON file here</div>
            <div style="font-size: 12px; color: #999;">or click to browse</div>
            <input type="file" accept=".json" id="file-input" style="display: none;" />
          </div>

          <div style="background-color: #f5f5f5; padding: 16px 0 12px 0;">
            <button class="button-primary" onclick="document.getElementById('file-input').click()">Choose File</button>
            <button class="button-secondary" ${!hasGitHubConfig ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : 'onclick="fetchFromGitHub()"'}>
              Fetch from GitHub
            </button>
          </div>
        </div>
      `;
      setupUploadListeners();
    }

    async function fetchFromGitHub() {
      if (!githubConfig || !githubConfig.token || !githubConfig.owner || !githubConfig.repo || !githubConfig.path) {
        alert('Please configure GitHub settings first');
        showGitHubSettings();
        return;
      }

      try {
        const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${githubConfig.path}?ref=${githubConfig.branch}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `token ${githubConfig.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) {
          throw new Error(`GitHub API error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const content = atob(data.content.replace(/\n/g, ''));
        const raw = JSON.parse(content);

        jsonTokens = normalizeTokens(raw);
        fileName = githubConfig.path.split('/').pop();

        parent.postMessage({
          pluginMessage: {
            type: 'get-variables'
          }
        }, '*');
      } catch (error) {
        alert(`Failed to fetch from GitHub: ${error.message}`);
      }
    }

    function showPushScreen() {
      const today = new Date();
      const dateStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
      const defaultBranch = 'figma-tokens/' + dateStr;

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
          <div class="screen-header">
            <div class="back-icon" onclick="showDashboard()">←</div>
            <div>
              <p class="screen-title">Push to GitHub</p>
              <p class="screen-subtitle">Export current Figma Variables and open a Pull Request</p>
            </div>
          </div>

          <div style="flex: 1; overflow-y: auto; min-height: 0;">
            <label class="input-label">Branch Name</label>
            <input type="text" class="input-field" id="push-branch" value="${defaultBranch}" />

            <label class="input-label">PR Title</label>
            <input type="text" class="input-field" id="push-pr-title" placeholder="Update design tokens from Figma" />

            <label class="input-label">PR Description <span style="color:#bbb; font-weight:400;">(optional)</span></label>
            <textarea class="input-field" id="push-pr-body" rows="3" placeholder="Describe what changed..." style="resize: none; height: 72px;"></textarea>

            <div style="background: #f0f7ff; border-radius: 8px; padding: 12px; font-size: 11px; color: #555; line-height: 1.5; margin-top: 4px;">
              Will push to <strong>${githubConfig.owner}/${githubConfig.repo}</strong> and open a PR into <strong>${githubConfig.branch}</strong>
            </div>
          </div>

          <div style="padding: 16px 0 12px 0;">
            <button class="button-primary" id="push-btn" onclick="initiatePush()">Create Pull Request</button>
          </div>
        </div>
      `;
    }

    function initiatePush() {
      const branch = document.getElementById('push-branch').value.trim();
      const prTitle = document.getElementById('push-pr-title').value.trim();
      const prBody = document.getElementById('push-pr-body').value.trim();

      if (!branch) { alert('Please enter a branch name.'); return; }
      if (!prTitle) { alert('Please enter a PR title.'); return; }

      const btn = document.getElementById('push-btn');
      btn.textContent = 'Pushing...';
      btn.disabled = true;

      // Store PR details globally, then request token JSON from backend
      window._pushData = { branch, prTitle, prBody };
      parent.postMessage({ pluginMessage: { type: 'get-tokens-for-push' } }, '*');
    }

    async function pushToGitHub(jsonString) {
      const { branch: newBranch, prTitle, prBody } = window._pushData;
      const { token, owner, repo, branch: baseBranch, path } = githubConfig;
      const headers = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      try {
        // Step 1: Get base branch SHA
        const refRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${baseBranch}`, { headers });
        if (!refRes.ok) throw new Error('Could not get base branch: ' + refRes.statusText);
        const refData = await refRes.json();
        const commitSha = refData.object.sha;

        // Step 2: Create new branch
        const branchRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ ref: 'refs/heads/' + newBranch, sha: commitSha })
        });
        if (!branchRes.ok) {
          const err = await branchRes.json();
          throw new Error('Could not create branch: ' + (err.message || branchRes.statusText));
        }

        // Step 3: Get existing file SHA (if file already exists, needed to update it)
        let existingFileSha = null;
        const fileRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${newBranch}`, { headers });
        if (fileRes.ok) {
          const fileData = await fileRes.json();
          existingFileSha = fileData.sha;
        }

        // Step 4: Commit token file to new branch
        const contentBody = {
          message: 'chore: update design tokens from Figma',
          content: btoa(unescape(encodeURIComponent(jsonString))),
          branch: newBranch
        };
        if (existingFileSha) contentBody.sha = existingFileSha;

        const commitRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
          method: 'PUT',
          headers,
          body: JSON.stringify(contentBody)
        });
        if (!commitRes.ok) {
          const err = await commitRes.json();
          throw new Error('Could not commit file: ' + (err.message || commitRes.statusText));
        }

        // Step 5: Create Pull Request
        const prRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/pulls`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ title: prTitle, body: prBody, head: newBranch, base: baseBranch })
        });
        if (!prRes.ok) {
          const err = await prRes.json();
          throw new Error('Could not create PR: ' + (err.message || prRes.statusText));
        }
        const prData = await prRes.json();

        showPushSuccess(prData.html_url, newBranch);
      } catch (error) {
        alert('Push failed: ' + error.message);
        // Re-enable button so user can retry
        const btn = document.getElementById('push-btn');
        if (btn) { btn.textContent = 'Create Pull Request'; btn.disabled = false; }
      }
    }

    // Detects and normalizes any known token format into the canonical flat structure:
    // { "group/token": { $value: ..., $type: ... } }
    function normalizeTokens(raw) {
      // Format 1: Array of collection objects: [{ "Collection Name": { modes: { "Mode": { tokens } } } }]
      if (Array.isArray(raw)) {
        var result = {};
        raw.forEach(function(collectionObj) {
          Object.keys(collectionObj).forEach(function(collectionName) {
            var collection = collectionObj[collectionName];
            if (collection && collection.modes && typeof collection.modes === 'object') {
              // Use the first mode's tokens
              var modeNames = Object.keys(collection.modes);
              if (modeNames.length > 0) {
                var modeTokens = collection.modes[modeNames[0]];
                Object.assign(result, extractTokens(modeTokens, ''));
              }
            } else {
              // Collection without modes wrapper
              Object.assign(result, extractTokens(collection, ''));
            }
          });
        });
        return result;
      }

      // Format 2: Object with a top-level "modes" key: { modes: { "Mode": { tokens } } }
      if (raw && raw.modes && typeof raw.modes === 'object') {
        var modeNames = Object.keys(raw.modes);
        if (modeNames.length > 0) {
          return extractTokens(raw.modes[modeNames[0]], '');
        }
      }

      // Format 3: Already flat or nested DTCG/Style Dictionary — just extract tokens
      return extractTokens(raw, '');
    }

    // Recursively extracts tokens from a nested object into flat { "path/to/token": { $value, $type } }
    function extractTokens(obj, prefix) {
      var result = {};
      if (!obj || typeof obj !== 'object') return result;

      Object.keys(obj).forEach(function(key) {
        // Skip metadata keys
        if (key === '$scopes' || key === '$description' || key === '$extensions') return;

        var val = obj[key];
        var fullName = prefix ? prefix + '/' + key : key;

        if (val && typeof val === 'object') {
          var hasValue = '$value' in val || 'value' in val;

          if (hasValue) {
            // It's a token — normalize to canonical form
            result[fullName] = {
              $value: val.$value !== undefined ? val.$value : val.value,
              $type: val.$type || val.type || guessType(val.$value !== undefined ? val.$value : val.value)
            };
          } else {
            // It's a group — recurse
            Object.assign(result, extractTokens(val, fullName));
          }
        }
      });

      return result;
    }

    // Guesses token type from value if $type is missing
    function guessType(value) {
      if (typeof value === 'boolean') return 'boolean';
      if (typeof value === 'number') return 'float';
      if (typeof value === 'string') {
        if (/^#([0-9a-fA-F]{3,8})$/.test(value)) return 'color';
        if (/^rgba?\(/.test(value)) return 'color';
        if (/^\d+(\.\d+)?(px|rem|em|%)$/.test(value)) return 'dimension';
        if (/^\d+(\.\d+)?$/.test(value)) return 'float';
      }
      return 'string';
    }

    function flattenTokens(obj, prefix) {
      prefix = prefix || '';
      var normalized = normalizeTokens(obj);
      var result = {};

      for (var key in normalized) {
        var value = normalized[key];
        result[key] = {
          value: value.$value,
          type: value.$type || 'string'
        };
      }

      return result;
    }

    function formatValue(value, type) {
      if (type === 'color' && typeof value === 'object' && value.r !== undefined) {
        const r = Math.round(value.r * 255);
        const g = Math.round(value.g * 255);
        const b = Math.round(value.b * 255);
        const hex = '#' + [r, g, b].map(function(x) {
          return x.toString(16).padStart(2, '0');
        }).join('');
        return hex;
      }
      return String(value);
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      console.log('Message from plugin:', msg);

      if (msg.type === 'dashboard-data') {
        const wasRefreshing = _isRefreshing;
        _isRefreshing = false;
        renderDashboard(msg.data);
        if (wasRefreshing) showRefreshSuccess();
      } else if (msg.type === 'figma-variables') {
        showComparison(msg.variables);
      } else if (msg.type === 'replace-complete') {
        showSuccess(msg.results);
      } else if (msg.type === 'github-config-loaded') {
        githubConfig = msg.config;
      } else if (msg.type === 'github-fetch-success') {
        jsonTokens = msg.tokens;
        fileName = msg.filename;
        parent.postMessage({ pluginMessage: { type: 'get-variables' } }, '*');
      } else if (msg.type === 'collections-data') {
        renderCollections(msg.collections);
      } else if (msg.type === 'variables-moved') {
        // No-op: UI was already updated optimistically
      } else if (msg.type === 'tokens-ready-for-push') {
        pushToGitHub(msg.json);
      } else if (msg.type === 'download-json') {
        const blob = new Blob([msg.json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = msg.filename;
        a.click();
        URL.revokeObjectURL(url);
      } else if (msg.type === 'error') {
        alert('Error: ' + msg.error);
      }
    };

    console.log('UI initialized');

    showDashboard();
  </script>
</body>
</html>
