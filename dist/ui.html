<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Figma Token Replacer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background-color: #f5f5f5;
    }
    * {
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #1E90FF;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 24px;
    }
    .upload-container {
      border: 2px dashed #d0d0d0;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background-color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-container:hover {
      border-color: #1E90FF;
      background-color: #fafbff;
    }
    .file-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .button-primary {
      width: 100%;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 600;
      background-color: #0F1C2E;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .button-primary:hover {
      background-color: #1a2d47;
    }
    .button-secondary {
      width: 100%;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 600;
      background-color: white;
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #e0e0e0;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .button-secondary:hover {
      background-color: #f8f8f8;
    }
    .token-card {
      background-color: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #e8e8e8;
    }
    .token-name {
      font-size: 12px;
      font-weight: 500;
      color: #0F1C2E;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .token-details {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .token-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: #f5f5f5;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    }
    .token-label {
      color: #666;
      font-size: 10px;
      font-weight: 600;
    }
    .section-header {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-line {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #333;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background-color: #4CAF50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: white;
      font-size: 48px;
      font-weight: 300;
    }
    .error-badge {
      display: inline-block;
      background-color: #f44336;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    .coming-soon {
      color: #999;
      font-size: 11px;
      margin-left: 8px;
    }
    .status-card {
      background-color: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #e8e8e8;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 12px;
    }
    .status-label {
      color: #666;
      font-weight: 500;
    }
    .status-value {
      color: #0F1C2E;
      font-weight: 600;
    }
    .action-button {
      width: 100%;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      background-color: white;
      color: #0F1C2E;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #e8e8e8;
      transition: all 0.2s;
      margin-bottom: 8px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-button:hover {
      background-color: #f8f8f8;
      border-color: #1E90FF;
    }
    .action-icon {
      font-size: 18px;
    }
    .settings-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      background-color: white;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 16px;
    }
    .settings-icon:hover {
      background-color: #f8f8f8;
      border-color: #1E90FF;
    }
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      background-color: white;
      color: #0F1C2E;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #e8e8e8;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .back-button:hover {
      background-color: #f8f8f8;
      border-color: #1E90FF;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      font-size: 13px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .input-field:focus {
      outline: none;
      border-color: #1E90FF;
    }
    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: #0F1C2E;
      margin-bottom: 6px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
      <button class="back-button" onclick="showDashboard()">
        <span>←</span>
        <span>Back</span>
      </button>

      <div class="upload-container" id="dropzone" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0;">
        <div class="file-icon">📄</div>
        <div style="font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #0F1C2E;">Drop your JSON file here</div>
        <div style="font-size: 12px; color: #999;">or click to browse</div>
        <input type="file" accept=".json" id="file-input" style="display: none;" />
      </div>

      <div style="background-color: #f5f5f5; padding: 16px 0 12px 0;">
        <button class="button-primary" onclick="document.getElementById('file-input').click()">Choose File</button>
        <button class="button-secondary" disabled style="opacity: 0.5; cursor: not-allowed;">Fetch from GitHub</button>
      </div>
    </div>
  </div>

  <script>
    console.log('Script starting...');

    let jsonTokens = null;
    let figmaVariables = [];
    let fileName = '';
    let currentVariableCount = 0;
    let githubConfig = null;

    const uploadScreenHTML = document.getElementById('root').innerHTML;

    const fileInput = document.getElementById('file-input');
    const dropzone = document.getElementById('dropzone');

    console.log('Elements found:', { fileInput, dropzone });

    function showDashboard() {
      parent.postMessage({ pluginMessage: { type: 'get-dashboard-data' } }, '*');
    }

    function renderDashboard(data) {
      currentVariableCount = data.variableCount || 0;

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 12px 20px; position: relative;">
          <div class="settings-icon" onclick="showGitHubSettings()">⚙️</div>

          <div class="logo">b/</div>

          <h2 style="margin: 0 0 16px 0; font-size: 16px; font-weight: 600; color: #0F1C2E;">Token Manager</h2>

          <div class="status-card">
            <div style="font-size: 12px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Current Status</div>
            <div class="status-row">
              <span class="status-label">Variables in Figma</span>
              <span class="status-value">${currentVariableCount}</span>
            </div>
            ${data.githubConnected ? `
              <div class="status-row" style="border-top: 1px solid #f0f0f0; margin-top: 8px; padding-top: 12px;">
                <span class="status-label">Connected Repo</span>
                <span class="status-value" style="font-size: 11px;">${data.githubRepo}</span>
              </div>
            ` : ''}
          </div>

          <div style="font-size: 12px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Quick Actions</div>

          <button class="action-button" onclick="showUploadScreen()">
            <span class="action-icon">📥</span>
            <span>Import JSON File</span>
          </button>

          <button class="action-button" onclick="showGitHubSettings()">
            <span class="action-icon">🔗</span>
            <span>${data.githubConnected ? 'Manage GitHub Connection' : 'Connect to GitHub'}</span>
          </button>

          ${currentVariableCount > 0 ? `
            <button class="action-button" onclick="exportTokens()">
              <span class="action-icon">📤</span>
              <span>Export Tokens as JSON</span>
            </button>
          ` : ''}
        </div>
      `;
    }

    function showUploadScreen() {
      jsonTokens = null;
      figmaVariables = [];
      fileName = '';

      const hasGitHubConfig = githubConfig && githubConfig.token && githubConfig.owner && githubConfig.repo && githubConfig.path;

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
          <button class="back-button" onclick="showDashboard()">
            <span>←</span>
            <span>Back</span>
          </button>

          <div class="upload-container" id="dropzone" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0;">
            <div class="file-icon">📄</div>
            <div style="font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #0F1C2E;">Drop your JSON file here</div>
            <div style="font-size: 12px; color: #999;">or click to browse</div>
            <input type="file" accept=".json" id="file-input" style="display: none;" />
          </div>

          <div style="background-color: #f5f5f5; padding: 16px 0 12px 0;">
            <button class="button-primary" onclick="document.getElementById('file-input').click()">Choose File</button>
            <button class="button-secondary" ${!hasGitHubConfig ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : 'onclick="fetchFromGitHub()"'}>
              Fetch from GitHub
            </button>
          </div>
        </div>
      `;
      setupUploadListeners();
    }

    async function fetchFromGitHub() {
      if (!githubConfig || !githubConfig.token || !githubConfig.owner || !githubConfig.repo || !githubConfig.path) {
        alert('Please configure GitHub settings first');
        showGitHubSettings();
        return;
      }

      try {
        const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${githubConfig.path}?ref=${githubConfig.branch}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `token ${githubConfig.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) {
          throw new Error(`GitHub API error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const content = atob(data.content.replace(/\n/g, ''));
        const raw = JSON.parse(content);

        jsonTokens = normalizeTokens(raw);
        fileName = githubConfig.path.split('/').pop();

        parent.postMessage({
          pluginMessage: {
            type: 'get-variables'
          }
        }, '*');
      } catch (error) {
        alert(`Failed to fetch from GitHub: ${error.message}`);
      }
    }

    function showGitHubSettings() {
      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 12px 20px;">
          <button class="back-button" onclick="showDashboard()">
            <span>←</span>
            <span>Back</span>
          </button>

          <h2 style="margin: 0 0 8px 0; font-size: 16px; font-weight: 600; color: #0F1C2E;">GitHub Settings</h2>
          <div style="font-size: 12px; color: #999; margin-bottom: 24px;">Configure your GitHub connection</div>

          <div style="flex: 1; overflow-y: auto; min-height: 0;">
            <label class="input-label">Personal Access Token</label>
            <input type="password" class="input-field" id="github-token" placeholder="ghp_••••••••••••••••" />

            <label class="input-label">Repository Owner</label>
            <input type="text" class="input-field" id="github-owner" placeholder="your-organization" />

            <label class="input-label">Repository Name</label>
            <input type="text" class="input-field" id="github-repo" placeholder="design-tokens" />

            <label class="input-label">Branch</label>
            <input type="text" class="input-field" id="github-branch" value="main" />

            <label class="input-label">Token File Path</label>
            <input type="text" class="input-field" id="github-path" placeholder="tokens/colors.json" />

            <div style="background-color: #e8f5e9; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 11px; color: #2e7d32; border: 1px solid #c8e6c9;">
              <strong>✓ Fetch tokens:</strong> You can now fetch tokens from GitHub. Push functionality (creating PRs) is coming soon.
            </div>
          </div>

          <div style="background-color: #f5f5f5; padding: 16px 0 0 0; margin-top: 16px;">
            <button class="button-primary" onclick="saveGitHubSettings()">Save Settings</button>
            <button class="button-secondary" onclick="showDashboard()">Cancel</button>
          </div>
        </div>
      `;

      if (githubConfig) {
        document.getElementById('github-token').value = githubConfig.token || '';
        document.getElementById('github-owner').value = githubConfig.owner || '';
        document.getElementById('github-repo').value = githubConfig.repo || '';
        document.getElementById('github-branch').value = githubConfig.branch || 'main';
        document.getElementById('github-path').value = githubConfig.path || '';
      }
    }

    function saveGitHubSettings() {
      githubConfig = {
        token: document.getElementById('github-token').value,
        owner: document.getElementById('github-owner').value,
        repo: document.getElementById('github-repo').value,
        branch: document.getElementById('github-branch').value,
        path: document.getElementById('github-path').value
      };

      parent.postMessage({
        pluginMessage: {
          type: 'save-github-config',
          config: githubConfig
        }
      }, '*');

      showDashboard();
    }

    function exportTokens() {
      parent.postMessage({ pluginMessage: { type: 'export-tokens' } }, '*');
    }

    function setupUploadListeners() {
      const newFileInput = document.getElementById('file-input');
      const newDropzone = document.getElementById('dropzone');

      if (!newFileInput || !newDropzone) return;

      newDropzone.addEventListener('dragover', handleDragOver);
      newDropzone.addEventListener('dragleave', handleDragLeave);
      newDropzone.addEventListener('drop', handleDrop);
      newFileInput.addEventListener('change', handleFileInput);
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = '#18A0FB';
      e.currentTarget.style.backgroundColor = '#f0f8ff';
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = '#e0e0e0';
      e.currentTarget.style.backgroundColor = '#fafafa';
    }

    function handleDrop(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = '#e0e0e0';
      e.currentTarget.style.backgroundColor = '#fafafa';

      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    function handleFileInput(e) {
      const files = e.target.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    setupUploadListeners();

    function processFile(file) {
      console.log('Processing file:', file.name);
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const raw = JSON.parse(e.target.result);
          console.log('JSON parsed:', raw);
          jsonTokens = normalizeTokens(raw);
          console.log('Normalized tokens:', jsonTokens);
          parent.postMessage({ pluginMessage: { type: 'get-variables' } }, '*');
        } catch (error) {
          alert('Error parsing JSON file: ' + error);
        }
      };
      reader.readAsText(file);
    }

    // Detects and normalizes any known token format into the canonical flat structure:
    // { "group/token": { $value: ..., $type: ... } }
    function normalizeTokens(raw) {
      // Format 1: Array of collection objects: [{ "Collection Name": { modes: { "Mode": { tokens } } } }]
      if (Array.isArray(raw)) {
        var result = {};
        raw.forEach(function(collectionObj) {
          Object.keys(collectionObj).forEach(function(collectionName) {
            var collection = collectionObj[collectionName];
            if (collection && collection.modes && typeof collection.modes === 'object') {
              // Use the first mode's tokens
              var modeNames = Object.keys(collection.modes);
              if (modeNames.length > 0) {
                var modeTokens = collection.modes[modeNames[0]];
                Object.assign(result, extractTokens(modeTokens, ''));
              }
            } else {
              // Collection without modes wrapper
              Object.assign(result, extractTokens(collection, ''));
            }
          });
        });
        return result;
      }

      // Format 2: Object with a top-level "modes" key: { modes: { "Mode": { tokens } } }
      if (raw && raw.modes && typeof raw.modes === 'object') {
        var modeNames = Object.keys(raw.modes);
        if (modeNames.length > 0) {
          return extractTokens(raw.modes[modeNames[0]], '');
        }
      }

      // Format 3: Already flat or nested DTCG/Style Dictionary — just extract tokens
      return extractTokens(raw, '');
    }

    // Recursively extracts tokens from a nested object into flat { "path/to/token": { $value, $type } }
    function extractTokens(obj, prefix) {
      var result = {};
      if (!obj || typeof obj !== 'object') return result;

      Object.keys(obj).forEach(function(key) {
        // Skip metadata keys
        if (key === '$scopes' || key === '$description' || key === '$extensions') return;

        var val = obj[key];
        var fullName = prefix ? prefix + '/' + key : key;

        if (val && typeof val === 'object') {
          var hasValue = '$value' in val || 'value' in val;

          if (hasValue) {
            // It's a token — normalize to canonical form
            result[fullName] = {
              $value: val.$value !== undefined ? val.$value : val.value,
              $type: val.$type || val.type || guessType(val.$value !== undefined ? val.$value : val.value)
            };
          } else {
            // It's a group — recurse
            Object.assign(result, extractTokens(val, fullName));
          }
        }
      });

      return result;
    }

    // Guesses token type from value if $type is missing
    function guessType(value) {
      if (typeof value === 'boolean') return 'boolean';
      if (typeof value === 'number') return 'float';
      if (typeof value === 'string') {
        if (/^#([0-9a-fA-F]{3,8})$/.test(value)) return 'color';
        if (/^rgba?\(/.test(value)) return 'color';
        if (/^\d+(\.\d+)?(px|rem|em|%)$/.test(value)) return 'dimension';
        if (/^\d+(\.\d+)?$/.test(value)) return 'float';
      }
      return 'string';
    }

    function flattenTokens(obj, prefix) {
      prefix = prefix || '';
      var normalized = normalizeTokens(obj);
      var result = {};

      for (var key in normalized) {
        var value = normalized[key];
        result[key] = {
          value: value.$value,
          type: value.$type || 'string'
        };
      }

      return result;
    }

    function formatValue(value, type) {
      if (type === 'color' && typeof value === 'object' && value.r !== undefined) {
        const r = Math.round(value.r * 255);
        const g = Math.round(value.g * 255);
        const b = Math.round(value.b * 255);
        const hex = '#' + [r, g, b].map(function(x) {
          return x.toString(16).padStart(2, '0');
        }).join('');
        return hex;
      }
      return String(value);
    }

    function showComparison(variables) {
      figmaVariables = variables;
      const flatTokens = flattenTokens(jsonTokens);
      const toUpdate = [];
      const toCreate = [];

      for (const tokenName in flatTokens) {
        const token = flatTokens[tokenName];
        const matchingVar = variables.find(function(v) { return v.name === tokenName; });

        if (matchingVar) {
          toUpdate.push({
            name: tokenName,
            figmaValue: matchingVar.value,
            jsonValue: token.value,
            type: token.type || 'string',
            action: 'update'
          });
        } else {
          toCreate.push({
            name: tokenName,
            jsonValue: token.value,
            type: token.type || 'string',
            action: 'create'
          });
        }
      }

      const totalCount = toUpdate.length + toCreate.length;

      if (totalCount === 0) {
        document.getElementById('root').innerHTML = `
          <div class="logo">b/</div>
          <h2 style="margin: 0 0 8px 0; font-size: 16px; font-weight: 600; color: #0F1C2E;">No Tokens Found</h2>
          <div style="padding: 20px; text-align: center; background-color: white; border-radius: 8px; font-size: 12px; color: #666; border: 1px solid #e8e8e8;">
            No tokens found in the JSON file
          </div>
          <button class="button-secondary" onclick="resetToUpload()">Go Back</button>
        `;
        return;
      }

      let allTokensHTML = '';
      const allTokens = toCreate.concat(toUpdate);

      allTokensHTML = allTokens.map(function(token) {
        const isUpdate = token.action === 'update';
        return `
          <div class="token-card">
            <div class="token-name">${token.name}</div>
            <div class="token-details">
              <div class="token-pill">
                <span class="token-label">Value:</span>
                <span>${formatValue(isUpdate ? token.jsonValue : token.jsonValue, token.type)}</span>
              </div>
              <div class="token-pill">
                <span class="token-label">Type:</span>
                <span>${token.type}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; height: 100vh; padding: 20px 20px 0 20px;">
          <div>
            <div class="logo">b/</div>

            <h2 style="margin: 0 0 4px 0; font-size: 16px; font-weight: 600; color: #0F1C2E;">Token Review</h2>
            <div style="font-size: 12px; color: #999; margin-bottom: 16px;">File: ${fileName}</div>

            <div class="stats-line">
              ${toCreate.length > 0 ? toCreate.length + '/' + totalCount + ' created' : totalCount + ' token' + (totalCount !== 1 ? 's' : '')}
            </div>

            <div style="font-size: 11px; font-weight: 600; color: #999; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
              ${toCreate.length > 0 ? 'New Tokens' : 'Tokens to Update'}
            </div>
          </div>

          <div style="flex: 1; overflow-y: auto; min-height: 0; margin-bottom: 16px;">
            ${allTokensHTML}
          </div>

          <div style="background-color: #f5f5f5; padding: 16px 0 12px 0;">
            <button class="button-primary" onclick="handleReplace()">Apply</button>
            <button class="button-secondary" onclick="resetToUpload()">Go Back</button>
          </div>
        </div>
      `;
    }

    function handleReplace() {
      parent.postMessage({
        pluginMessage: {
          type: 'replace-tokens',
          tokens: jsonTokens
        }
      }, '*');
    }

    function showSuccess(results) {
      const updated = results.updated || 0;
      const created = results.created || 0;
      const skipped = results.skipped || 0;
      const total = updated + created;

      let detailsHTML = '';
      if (updated > 0 || created > 0) {
        detailsHTML = `
          <div style="font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6;">
            <div style="margin-bottom: 4px;"><strong style="color: #0F1C2E;">${total}</strong> variable${total !== 1 ? 's' : ''} ${updated > 0 ? 'updated' : 'created'}</div>
            ${skipped > 0 ? '<div class="error-badge">' + skipped + ' skipped (errors)</div>' : ''}
          </div>
        `;
      }

      document.getElementById('root').innerHTML = `
        <div style="text-align: center; padding-top: 80px;">
          <div class="logo" style="margin: 0 auto 32px;">b/</div>
          <div class="success-icon">✓</div>
          <h2 style="margin: 0 0 16px 0; font-size: 18px; font-weight: 600; color: #0F1C2E;">Import Complete</h2>
          ${detailsHTML}
          <button class="button-primary" onclick="showDashboard()">Back to Dashboard</button>
        </div>
      `;
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      console.log('Message from plugin:', msg);

      if (msg.type === 'dashboard-data') {
        renderDashboard(msg.data);
      } else if (msg.type === 'figma-variables') {
        showComparison(msg.variables);
      } else if (msg.type === 'replace-complete') {
        showSuccess(msg.results);
      } else if (msg.type === 'github-config-loaded') {
        githubConfig = msg.config;
      } else if (msg.type === 'github-fetch-success') {
        jsonTokens = msg.tokens;
        fileName = msg.filename;
        parent.postMessage({ pluginMessage: { type: 'get-variables' } }, '*');
      } else if (msg.type === 'download-json') {
        const blob = new Blob([msg.json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = msg.filename;
        a.click();
        URL.revokeObjectURL(url);
      } else if (msg.type === 'error') {
        alert('Error: ' + msg.error);
      }
    };

    console.log('UI initialized');

    showDashboard();
  </script>
</body>
</html>
